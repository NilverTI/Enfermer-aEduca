<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursos y Libros - Enfermería Educa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .coming-soon-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            background: radial-gradient(circle at top right, hsl(var(--c-primary) / 0.05), transparent 40%),
                        radial-gradient(circle at bottom left, hsl(var(--c-primary) / 0.05), transparent 40%);
        }
        .cs-card {
            max-width: 600px;
            background: white;
            padding: 60px 40px;
            border-radius: var(--rad-xl);
            box-shadow: var(--shadow-xl);
            border: 1px solid hsl(var(--c-border) / 0.5);
            position: relative;
            overflow: hidden;
        }
        .cs-icon {
            font-size: 80px;
            margin-bottom: 24px;
            display: block;
        }
        .cs-title {
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            font-family: var(--font-display);
            margin-bottom: 20px;
            line-height: 1.1;
        }
        .cs-subtitle {
            font-size: 1.25rem;
            color: hsl(var(--c-text-muted));
            margin-bottom: 40px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 14px 28px;
            background: hsl(var(--c-primary));
            color: white;
            border-radius: var(--rad-full);
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s var(--ease-smooth);
            box-shadow: 0 10px 20px hsl(var(--c-primary) / 0.2);
        }
        .back-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px hsl(var(--c-primary) / 0.3);
            background: hsl(var(--c-primary-dark));
        }
        .cs-decoration {
            position: absolute;
            top: -20px;
            right: -20px;
            font-size: 100px;
            opacity: 0.03;
            transform: rotate(15deg);
        }
    </style>
</head>
<body>
    <div class="coming-soon-container">
        <div class="cs-card fade-up">
            <span class="cs-icon">📚</span>
            <div class="cs-decoration">📘</div>
            <h1 class="cs-title">Muy pronto</h1>
            <p class="cs-subtitle">
                Estamos preparando <strong> todos nuestros recursos </strong> educativos, 
                guías descargables y libros exclusivos para ti. 
                Vuelve pronto para descubrirlos.
            </p>
            <a href="../index.html" class="back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m15 18-6-6 6-6"/>
                </svg>
                Regresar al Inicio
            </a>
        </div>
    </div>

    <!-- Script de animación básica para la página independiente -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.cs-card');
            setTimeout(() => {
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body>
</html>
